apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: seb-fagprove-backend
  namespace: laerlinger
spec:
  ingresses:
    - https://seb-fagprove-backend.intern.nav.no
  image: {{image}}
  port: 8080
  liveness:
    path: /internal/isalive
    initialDelay: 10
  readiness:
    path: /internal/isready
    initialDelay: 10
  replicas:
    min: 1
    max: 1
  env:
    - name: TZ
      value: Europe/Oslo
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
  accessPolicy:
    inbound:
      rules:
        - application: seb-fagprove-frontend
